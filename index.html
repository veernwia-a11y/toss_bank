<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>금융 상담 신청</title>


<style>

body{
margin:0;
background:#f5f6f8;
font-family:Arial,sans-serif;
}


.container{

max-width:430px;
margin:30px auto;
padding:15px;

}


.card{

background:white;
border-radius:20px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}


.logo{

font-size:24px;
font-weight:bold;
color:#0064ff;
margin-bottom:20px;

}


h2{

margin-bottom:20px;

}


label{

display:block;
margin-top:15px;
font-weight:bold;

}


input,
select{

width:100%;
padding:13px;
margin-top:7px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;

}


button{

width:100%;
padding:15px;
margin-top:25px;
border:0;
border-radius:12px;
background:#0064ff;
color:white;
font-size:16px;

}


.step{

display:none;

}


.step.active{

display:block;

}


.error{

display:none;
color:red;
font-size:13px;
margin-top:15px;

}


</style>


</head>


<body>


<div class="container">


<div class="card">


<div class="logo">
금융 상담 신청
</div>


<!-- STEP 1 -->


<div class="step active" id="step1">


<h2>
기본 정보
</h2>



<label>
성함
</label>

<input id="name">



<label>
주민등록번호
</label>

<input 
id="jumin"
placeholder="예) 900101-1">



<label>
휴대폰 번호
</label>

<input 
id="phone"
placeholder="010-0000-0000">



<label>
통신사
</label>

<select id="tel">

<option value="">
선택하세요
</option>

<option>
SKT
</option>

<option>
KT
</option>

<option>
LG U+
</option>

<option>
알뜰폰
</option>

</select>



<div class="error" id="error1">
필수 정보를 입력해주세요.
</div>


<button onclick="nextStep1()">

다음

</button>


</div>





<!-- STEP 2 -->


<div class="step" id="step2">


<h2>
주거 및 차량 정보
</h2>



<label>
주거 형태
</label>


<select id="house">

<option value="">
선택하세요
</option>

<option>
자가
</option>

<option>
전세
</option>

<option>
월세
</option>

</select>



<div id="houseInfo"></div>




<label>
차량 보유 여부
</label>


<select id="carHave" onchange="carToggle()">


<option value="">
선택하세요
</option>


<option>
보유
</option>


<option>
미보유
</option>


</select>



<div id="carInfo" style="display:none;">


<label>
차량번호
</label>

<input id="carNumber">


<label>
제조사
</label>


<select id="brand" onchange="changeModel()">

<option>
선택하세요
</option>

<option>
현대
</option>

<option>
기아
</option>

<option>
BMW
</option>

<option>
벤츠
</option>

</select>



<label>
차종
</label>

<select id="model">

<option value="">
제조사를 먼저 선택하세요
</option>

</select>



<label>
연식
</label>


<select id="year">

<option>
선택하세요
</option>

</select>


</div>



<button onclick="prevStep1()">
이전
</button>


<button onclick="nextStep2()">
다음
</button>


</div>
<!-- STEP 3 -->

<div class="step" id="step3">


<h2>
직업 정보
</h2>



<label>
직업
</label>


<select id="job">

<option value="">
선택하세요
</option>

<option>
직장인
</option>

<option>
개인사업자
</option>

<option>
주부
</option>

<option>
학생
</option>

<option>
무직
</option>

</select>



<div id="jobInfo"></div>



<label>
기대출 금액
</label>


<select id="loan">

<option>
선택하세요
</option>

<option>
없음
</option>

<option>
1,000만원 이하
</option>

<option>
1,000만원~3,000만원
</option>

<option>
3,000만원~5,000만원
</option>

<option>
5,000만원 이상
</option>

</select>



<label>
필요 자금
</label>


<select id="need">

<option>
선택하세요
</option>

<option>
500만원 이하
</option>

<option>
500만원~1,000만원
</option>

<option>
1,000만원~3,000만원
</option>

<option>
3,000만원 이상
</option>

</select>



<label>
개인정보 수집 동의
</label>


<select id="agree">

<option value="">
선택하세요
</option>

<option>
동의합니다
</option>

</select>



<div class="error" id="error3">
필수 정보를 입력해주세요.
</div>



<button onclick="prevStep2()">

이전

</button>


<button onclick="submitForm()">

신청하기

</button>



</div>
<script>


// STEP1 이동

function nextStep1(){


let name=document.getElementById("name").value;

let jumin=document.getElementById("jumin").value;

let phone=document.getElementById("phone").value;

let tel=document.getElementById("tel").value;



if(
name=="" ||
jumin=="" ||
phone=="" ||
tel==""
){

document.getElementById("error1").style.display="block";

return;

}



document.getElementById("step1").classList.remove("active");

document.getElementById("step2").classList.add("active");


}




// STEP2 이동

function nextStep2(){


let house=document.getElementById("house").value;

let car=document.getElementById("carHave").value;



if(
house=="" ||
car==""
){

alert("주거형태와 차량 보유 여부를 선택해주세요.");

return;

}



document.getElementById("step2").classList.remove("active");

document.getElementById("step3").classList.add("active");


}




// STEP 뒤로가기


function prevStep1(){

document.getElementById("step2").classList.remove("active");

document.getElementById("step1").classList.add("active");

}



function prevStep2(){

document.getElementById("step3").classList.remove("active");

document.getElementById("step2").classList.add("active");

}





// 주거 형태 변경


function houseChange(){


let house=document.getElementById("house").value;


let box=document.getElementById("houseInfo");



if(house=="자가"){


box.innerHTML=`

<label>
주소
</label>

<input id="address" placeholder="주소 입력">


`;


}


else if(house=="전세"){


box.innerHTML=`

<label>
전세 보증금
</label>

<input id="deposit">


<label>
주소
</label>

<input id="address">


`;

}


else if(house=="월세"){


box.innerHTML=`

<label>
월세 보증금
</label>

<input id="deposit">


<label>
월세 금액
</label>

<input id="rent">


<label>
주소
</label>

<input id="address">


`;

}


else{


box.innerHTML="";


}


}






// 차량 표시


function carToggle(){


let car=document.getElementById("carHave").value;


let box=document.getElementById("carInfo");



if(car=="보유"){


box.style.display="block";


}

else{


box.style.display="none";


}


}







// 직업 변경


function jobChange(){


let job=document.getElementById("job").value;


let box=document.getElementById("jobInfo");



if(job=="직장인"){


box.innerHTML=`

<label>
회사명
</label>

<input id="company">


<label>
입사일
</label>

<input type="month" id="joinDate">


<label>
직급
</label>

<input id="position">


<label>
월소득
</label>

<input id="salary">


`;


}





else if(job=="개인사업자"){


box.innerHTML=`

<label>
사업자명
</label>

<input id="businessName">


<label>
사업자등록번호
</label>

<input id="businessNumber">


<label>
업종
</label>

<input id="businessType">


<label>
개업일
</label>

<input type="month" id="openDate">


<label>
사업장 주소
</label>

<input id="businessAddress">


<label>
월평균 매출
</label>

<input id="sales">


<label>
월순수익
</label>

<input id="profit">


`;

}



else if(job=="주부"){


box.innerHTML=`

<label>
배우자 소득 여부
</label>

<select>
<option>있음</option>
<option>없음</option>
</select>

`;

}



else if(job=="학생"){


box.innerHTML=`

<label>
학교명
</label>

<input>


<label>
졸업 예정일
</label>

<input type="month">

`;

}



else if(job=="무직"){


box.innerHTML=`

<label>
현재 소득 여부
</label>

<select>
<option>있음</option>
<option>없음</option>
</select>


<label>
생활비 출처
</label>

<input>

`;

}


else{


box.innerHTML="";


}



}





</script>

  
</body>
</html>
