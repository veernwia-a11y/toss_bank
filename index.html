<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>대출 상담 신청</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

background:#f5f6f8;

font-family:"Noto Sans KR",Arial,sans-serif;

}



.container{

width:100%;

max-width:430px;

margin:30px auto;

padding:15px;

}



.card{

background:white;

border-radius:20px;

padding:25px;

box-shadow:0 5px 20px rgba(0,0,0,0.08);

}



.logo{

font-size:24px;

font-weight:700;

color:#0064ff;

margin-bottom:25px;

}



.step{

display:none;

}



.step.active{

display:block;

}



h2{

font-size:22px;

margin-bottom:25px;

}



label{

display:block;

font-weight:600;

margin-top:18px;

}



input,
select{


width:100%;

height:48px;

margin-top:8px;

padding:0 14px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;


}



button{


width:100%;

height:50px;

margin-top:30px;

border:none;

border-radius:12px;

background:#0064ff;

color:white;

font-size:16px;

font-weight:bold;


}



.jumin{

display:flex;

align-items:center;

gap:10px;

}



.jumin input{

text-align:center;

}



</style>


</head>



<body>



<div class="container">


<div class="card">



<div class="logo">

대출 상담 신청

</div>




<!-- STEP 1 -->

<div class="step active" id="step1">



<h2>

기본 정보

</h2>



<label>

성함

</label>


<input 
id="name"
placeholder="성함 입력">





<label>

주민등록번호

</label>



<div class="jumin">


<input

id="jumin1"

maxlength="6"

placeholder="앞 6자리"

oninput="this.value=this.value.replace(/[^0-9]/g,'')"

>



<span>-</span>



<input

id="jumin2"

maxlength="7"

placeholder="뒤 7자리"

oninput="this.value=this.value.replace(/[^0-9]/g,'')"

>



</div>





<label>

휴대폰 번호

</label>



<input

id="phone"

placeholder="010-0000-0000"

oninput="this.value=this.value.replace(/[^0-9-]/g,'')"

>




<label>

통신사

</label>



<select id="tel">


<option value="">

선택하세요

</option>


<option>

SKT

</option>


<option>

KT

</option>


<option>

LG U+

</option>


<option>

알뜰폰

</option>


</select>





<button onclick="nextStep1()">

다음

</button>




</div>
