<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>대출플래너 AI 시스템</title>

<style>
body{
    margin:0;
    background:#edf2f7;
    font-family:Arial,sans-serif;
}
.wrap{
    max-width:430px;
    margin:20px auto;
    padding:14px;
}
.card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    padding:22px;
}
.badge{
    display:inline-block;
    background:#0b6efd;
    color:#fff;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
}
h2{
    margin:12px 0 6px;
}
.progress{
    height:8px;
    background:#e9ecef;
    border-radius:99px;
    overflow:hidden;
    margin:16px 0;
}
.bar{
    height:100%;
    width:0%;
    background:#0b6efd;
    transition:.3s;
}
label{
    display:block;
    margin-top:14px;
    font-weight:bold;
}
input,select{
    width:100%;
    padding:12px;
    border:1px solid #d0d7de;
    border-radius:10px;
    margin-top:6px;
    box-sizing:border-box;
}
button{
    width:100%;
    margin-top:18px;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#0b6efd;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#0958d9;
}
#done{
    display:none;
    text-align:center;
}
.small{
    color:#666;
    font-size:13px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card" id="form">

<span class="badge">🤖 대출플래너 AI SYSTEM</span>

<h2>AI 상담 시작</h2>

<p class="small">
고객님의 조건에 맞는 상담을 위해 정보를 입력해 주세요.
</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<label>성함</label>
<input id="customerName" placeholder="홍길동">

<label>생년월일 (6자리)</label>
<input id="birth" placeholder="900101">

<label>거주지역</label>
<input id="addr" placeholder="서울">

<label>직업</label>
<select id="job">
<option>직장인</option>
<option>사업자</option>
<option>프리랜서</option>
<option>주부</option>
<option>무직</option>
</select>

<label>연락처</label>
<input id="phone" placeholder="01012345678">

<label>통신사</label>
<select id="tel">
<option>SKT</option>
<option>KT</option>
<option>LG U+</option>
<option>알뜰폰</option>
</select>

<label>기대출 금액</label>
<input id="loan" placeholder="3000만원">

<label>필요 자금</label>
<input id="need" placeholder="1000만원">

<button onclick="finish()">AI 상담 접수</button>

</div>

<div class="card" id="done">

<h2>✅ 접수 완료</h2>

<p>입력된 내용을 복사하여 상담창에 붙여넣어 주세요.</p>

<button onclick="copyData()">📋 상담내용 복사하기</button>

</div>

</div>

<script>

const fields=document.querySelectorAll("input,select");

fields.forEach(f=>{
    f.addEventListener("input",update);
});

function update(){

    let filled=0;

    fields.forEach(f=>{
        if(f.value.trim()!=""){
            filled++;
        }
    });

    document.getElementById("bar").style.width=
    (filled/fields.length*100)+"%";

}

function finish(){

    document.getElementById("form").style.display="none";
    document.getElementById("done").style.display="block";

}

function copyData(){

    const customerName=document.getElementById("customerName").value;
    const birth=document.getElementById("birth").value;
    const addr=document.getElementById("addr").value;
    const job=document.getElementById("job").value;
    const phone=document.getElementById("phone").value;
    const tel=document.getElementById("tel").value;
    const loan=document.getElementById("loan").value;
    const need=document.getElementById("need").value;

    const text=`성함 : ${customerName}
생년월일 : ${birth}
거주지역 : ${addr}
직업 : ${job}
연락처 : ${phone}
통신사 : ${tel}
기대출 금액 : ${loan}
필요 자금 : ${need}`;

    navigator.clipboard.writeText(text)
    .then(()=>{
        alert("상담 내용이 복사되었습니다.");
    })
    .catch(()=>{
        alert("복사에 실패했습니다.");
    });

}

</script>

</body>
</html>
